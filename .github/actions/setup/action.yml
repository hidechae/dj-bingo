name: "Setup Project"
description: "Setup Node.js, install dependencies, and generate Prisma client"

inputs:
  generate-prisma:
    description: "Whether to generate Prisma client (deprecated: always generates now)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: "npm"

    - name: Install dependencies
      run: npm install --ignore-scripts
      shell: bash

    - name: Generate Prisma Client
      run: npm run db:generate
      shell: bash
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/db
        DIRECT_DATABASE_URL: postgresql://user:password@localhost:5432/db
